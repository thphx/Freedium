<section class="w-full px-4 pb-16 md:px-6">
    <div class="max-w-6xl mx-auto">
        <div class="grid items-stretch grid-cols-1 gap-6 md:grid-cols-2 lg:grid-cols-3">
            {% for post in post_list %}
                <article class="flex flex-col h-full overflow-hidden transition duration-200 bg-white border border-gray-200 shadow-sm dark:bg-gray-700 dark:border-gray-600 rounded-2xl hover:shadow-lg">
                    <a class="block overflow-hidden bg-gray-100 h-52 md:h-56 dark:bg-gray-800 group" href="/{{ post.post_id }}">
                        {% if post.preview_image_id %}
                            <img
                                loading="eager"
                                referrerpolicy="no-referrer"
                                src="https://miro.medium.com/v2/resize:fit:700/{{ post.preview_image_id }}"
                                alt="{{ post.title }}"
                                class="object-cover object-center w-full h-full transition duration-300 ease-in-out group-hover:scale-105"
                            >
                        {% else %}
                            <img
                                loading="eager"
                                referrerpolicy="no-referrer"
                                src="https://images.unsplash.com/photo-1636467204130-edf8ee206dce?ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&ixlib=rb-1.2.1&auto=format&fit=crop&w=600&q=80"
                                alt="{{ post.title }}"
                                class="object-cover object-center w-full h-full transition duration-300 ease-in-out group-hover:scale-105"
                            >
                        {% endif %}
                    </a>

                    <div class="flex flex-col flex-1 p-5">
                        <a href="/{{ post.post_id }}" class="block group">
                            <h3 class="h-[3.25rem] overflow-hidden text-lg font-semibold leading-snug text-gray-900 transition duration-200 dark:text-gray-100 group-hover:text-purple-500 md:text-xl line-clamp-2">
                                {{ post.title }}
                            </h3>
                        </a>

                        <p class="mt-3 h-[4.75rem] overflow-hidden leading-relaxed text-gray-600 line-clamp-3 dark:text-gray-200">
                            {{ post.description }}
                        </p>

                        <div class="mt-4 h-[2.5rem] overflow-hidden flex flex-wrap items-center gap-x-2 gap-y-1 text-sm text-gray-500 dark:text-gray-300">
                            <span>~{{ post.reading_time }} min read</span>
                            <span>·</span>
                            <span>{{ post.first_published_at }}</span>
                            <span>·</span>
                            <span class="font-medium text-yellow-500 dark:text-yellow-300">Free: {{ post.free_access }}</span>
                        </div>

                        <a href="/{{ post.post_id }}" class="inline-block pt-5 mt-auto font-medium text-purple-500 hover:text-purple-400">
                            Read More
                        </a>
                    </div>
                </article>
            {% endfor %}
        </div>
    </div>
</section>
